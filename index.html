<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Game</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4d7; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 125px); 
            grid-template-rows: repeat(3, 125px); 
            gap: 5px; 
            justify-content: center; 
            margin: 20px auto; 
        }
        .cell { 
            width: 125px; height: 125px; background: rgba(255, 255, 255, 0.842); 
            border: 1px solid #333; font-size: 40px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }
        #status { margin-top: 20px; font-size: 24px; }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    <div id="status">Turn: X</div>

    <div class="grid">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>

    <button onclick="resetGame()">Restart</button>

    <script>
        var board = ["", "", "", "", "", "", "", "", ""];
        var player = "X";
        var active = true;

        function makeMove(element, index) {
            if (board[index] == "" && active) {
                board[index] = player;
                element.innerHTML = player;
                checkWin();
            }
        }
